# Release pipeline: push a `v*` tag and this builds, signs, and publishes
# the update artifacts (+ latest.json manifest) as a GitHub Release on
# this repo — which is what installed apps poll via tauri-plugin-updater
# (see tauri.conf.json → plugins.updater.endpoints).
#
# Required repo secret:
#   TAURI_SIGNING_PRIVATE_KEY — contents of the updater signing key
#     (~/.tauri/helm.key on the machine that ran `tauri signer generate`).
#     The matching pubkey is baked into tauri.conf.json; installs refuse
#     bundles this key didn't sign.
#
# The version comes from tauri.conf.json — bump it before tagging, and
# keep the tag in sync (tag v0.2.0 ↔ "version": "0.2.0").
name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write # create the release + upload assets

jobs:
  build:
    # macos-latest is an arm64 runner → darwin-aarch64 artifacts.
    # Add an x86_64 matrix leg here if an Intel Mac ever needs Helm.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      # Fail fast if the tag and config disagree. The updater only offers
      # versions greater than the installed one, so tagging v0.2.0 while
      # tauri.conf.json still says 0.1.0 would publish a release that no
      # install ever sees — silently.
      - name: Verify tag matches tauri.conf.json version
        run: |
          conf=$(python3 -c "import json; print(json.load(open('crates/helm-app/tauri.conf.json'))['version'])")
          tag="${GITHUB_REF_NAME#v}"
          if [ "$conf" != "$tag" ]; then
            echo "::error::Tag $GITHUB_REF_NAME ≠ tauri.conf.json version $conf — bump the config before tagging."
            exit 1
          fi

      - uses: oven-sh/setup-bun@v2

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2

      - run: bun install --frozen-lockfile

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
        with:
          tagName: v__VERSION__
          releaseName: Helm v__VERSION__
          releaseBody: 'Signed auto-update artifacts for Helm.'
          # This repo has no src-tauri; the tauri CLI discovers
          # crates/helm-app/tauri.conf.json itself. Run it through bun so
          # it uses the project-local CLI.
          tauriScript: bun tauri

      # Evergreen download URL. The DMG tauri produces is version-stamped
      # (Helm_0.1.0_aarch64.dmg), which breaks any pinned link the moment
      # the next release ships. Upload a stable-named copy so
      # releases/latest/download/Helm_aarch64.dmg always works in docs.
      - name: Upload evergreen DMG alias
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          dmg=$(find target/release/bundle/dmg -name '*.dmg' | head -n1)
          cp "$dmg" Helm_aarch64.dmg
          gh release upload "$GITHUB_REF_NAME" Helm_aarch64.dmg --clobber
